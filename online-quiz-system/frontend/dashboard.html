<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NovaQuiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="glass" id="main-nav" style="margin: 0; border-radius: 0; border-bottom: 1px solid rgba(255,255,255,0.1); border-top: none; border-left: none; border-right: none;"></nav>

    <div class="container mt-4">
        <h1>Welcome back, <span id="user-greeting"></span></h1>
        
        <div class="glass" style="padding: 2rem; margin-top: 2rem; margin-bottom: 3rem;">
            <h2>Available Quizzes</h2>
            
            <div class="filters">
                <select id="category-filter" class="form-control" style="width: auto;">
                    <option value="All">All Categories</option>
                    <option value="General">General Knowledge</option>
                    <option value="Programming">Programming</option>
                    <option value="Math">Math</option>
                    <option value="Science">Science</option>
                </select>
            </div>

            <div id="quiz-grid" class="grid">
                <!-- Quizzes will be loaded here -->
                <p>Loading quizzes...</p>
            </div>
        </div>

        <div class="glass" style="padding: 2rem;">
            <h2>Your Attempt History</h2>
            <div class="table-container mt-2">
                <table>
                    <thead>
                        <tr>
                            <th>Quiz Title</th>
                            <th>Score</th>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- History loaded here -->
                        <tr><td colspan="4">Loading history...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const user = App.initAuth();
        App.setupNavbar();
        document.getElementById('user-greeting').innerText = user.username;

        const loadQuizzes = async (category = 'All') => {
            const grid = document.getElementById('quiz-grid');
            try {
                const url = category === 'All' ? '/quizzes' : `/quizzes?category=${encodeURIComponent(category)}`;
                const quizzes = await ApiService.get(url);
                
                if (quizzes.length === 0) {
                    grid.innerHTML = '<p>No quizzes found in this category.</p>';
                    return;
                }

                grid.innerHTML = quizzes.map(q => `
                    <div class="glass quiz-card">
                        <h3>${q.title}</h3>
                        <div class="meta">
                            <span class="badge">${q.category}</span>
                            <span>${q.questionCount || 0} Questions</span>
                        </div>
                        <p>${q.description || 'Test your knowledge!'}</p>
                        <div class="actions">
                            <button class="btn btn-primary" onclick="window.location.href='quiz.html?id=${q.quizId}'">Attempt Quiz</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                grid.innerHTML = `<p style="color:var(--danger)">Failed to load quizzes: ${error.message}</p>`;
            }
        };

        const loadHistory = async () => {
            const tbody = document.getElementById('history-body');
            try {
                const attempts = await ApiService.get('/attempts');
                if (attempts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No attempts yet. Go take a quiz!</td></tr>';
                    return;
                }

                tbody.innerHTML = attempts.map(a => {
                    const pass = (a.score / a.total) >= 0.5;
                    const statusColor = pass ? 'var(--success)' : 'var(--danger)';
                    return `
                    <tr>
                        <td>${a.quizTitle || 'Unknown Quiz'}</td>
                        <td>${a.score} / ${a.total} (${Math.round((a.score/a.total)*100)}%)</td>
                        <td>${new Date(a.timestamp).toLocaleString()}</td>
                        <td style="color: ${statusColor}">${pass ? 'Passed' : 'Failed'}</td>
                    </tr>
                `}).join('');
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="4" style="color:var(--danger)">Failed to load history.</td></tr>`;
            }
        };

        document.getElementById('category-filter').addEventListener('change', (e) => {
            loadQuizzes(e.target.value);
        });

        // Initialize
        loadQuizzes();
        loadHistory();
    </script>
</body>
</html>
